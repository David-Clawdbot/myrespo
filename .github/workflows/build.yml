name: Build APK (Regenerate All)

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Remove ALL wrapper files and directories
        run: |
          echo "=== Cleaning up Gradle Wrapper ==="
          rm -rf gradle/wrapper
          rm -f gradlew gradlew.bat
      
      - name: Regenerate entire Gradle Wrapper
        run: |
          echo "=== Regenerating Wrapper with system Gradle ==="
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
      
      - name: Build APK
        run: |
          echo "=== Building APK with gradlew ==="
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: List build outputs
        if: always()
        run: |
          echo "=== Build directory contents ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          echo "=== Checking for APK ==="
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
      
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
            app/build/reports/
          if-no-files-found: ignore

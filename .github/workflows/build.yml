name: Build APK with Debug

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Remove ALL wrapper files
        run: |
          echo "=== Removing all Gradle Wrapper files ==="
          rm -rf gradle/wrapper
          rm -f gradlew gradlew.bat
      
      - name: Regenerate Gradle Wrapper
        run: |
          echo "=== Regenerating Gradle Wrapper ==="
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
      
      - name: Display Gradle version
        run: |
          echo "=== Gradle version ==="
          ./gradlew --version
          echo "=== Gradle info ==="
          ./gradlew info --stacktrace
      
      - name: Build APK with full debug output
        run: |
          echo "=== Building APK with full debug ==="
          ./gradlew assembleDebug --no-daemon --stacktrace --info --debug
        continue-on-error: true
      
      - name: Display build output directory
        if: always()
        run: |
          echo "=== Build output directory ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          echo "=== Checking for APK ==="
          find app/build -name "*.apk" 2>/dev/null | head -10 || echo "No APK found"
          echo "=== Checking for build failures ==="
          find app/build -name "*.log" 2>/dev/null || echo "No log files"
      
      - name: Upload all build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/
            app/build/reports/
            app/build/logs/
          if-no-files-found: ignore
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
